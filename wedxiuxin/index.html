<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Random Món Ăn Pro</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background: linear-gradient(135deg,#ffecd2,#fcb69f);
    text-align:center;
    padding:30px 15px;
}

h1{
    margin-bottom:30px;
}

.container{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:20px;
}

.card{
    background:white;
    width:320px;
    padding:20px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

.result{
    margin:15px 0;
    font-weight:bold;
    font-size:20px;
    color:#e67e22;
}

img{
    width:100%;
    height:180px;
    object-fit:cover;
    border-radius:10px;
    margin-bottom:10px;
}

button{
    padding:8px 15px;
    border:none;
    background:#ff7e5f;
    color:white;
    border-radius:20px;
    cursor:pointer;
    margin-top:5px;
}

button:hover{
    background:#eb5757;
}

input{
    width:100%;
    padding:8px;
    margin:5px 0;
    border-radius:8px;
    border:1px solid #ccc;
}

@media(max-width:768px){
    .container{
        flex-direction:column;
        align-items:center;
    }
}
</style>
</head>
<body>

<h1>🍽️ nhóm lăm chọn món hộ bạn</h1>

<div class="container">

    <!-- CARD TEMPLATE -->
    <div class="card">
        <h2>🍳 Ăn Sáng</h2>
        <img id="breakfastImg" src="" alt="">
        <div class="result" id="breakfastResult">Bấm Random để chọn</div>
        <button onclick="randomFood('breakfast')">Random</button>

        <h4>Thêm món mới</h4>
        <input type="text" id="breakfastName" placeholder="Tên món">
        <input type="text" id="breakfastImage" placeholder="Link hình ảnh">
        <button onclick="addFood('breakfast')">Thêm</button>
    </div>

    <div class="card">
        <h2>🍛 Ăn Trưa</h2>
        <img id="lunchImg" src="" alt="">
        <div class="result" id="lunchResult">Bấm Random để chọn</div>
        <button onclick="randomFood('lunch')">Random</button>

        <h4>Thêm món mới</h4>
        <input type="text" id="lunchName" placeholder="Tên món">
        <input type="text" id="lunchImage" placeholder="Link hình ảnh">
        <button onclick="addFood('lunch')">Thêm</button>
    </div>

    <div class="card">
        <h2>🍲 Ăn Tối</h2>
        <img id="dinnerImg" src="" alt="">
        <div class="result" id="dinnerResult">Bấm Random để chọn</div>
        <button onclick="randomFood('dinner')">Random</button>

        <h4>Thêm món mới</h4>
        <input type="text" id="dinnerName" placeholder="Tên món">
        <input type="text" id="dinnerImage" placeholder="Link hình ảnh">
        <button onclick="addFood('dinner')">Thêm</button>
    </div>

</div>

<script>

// Dữ liệu mặc định
const defaultFoods = {
    breakfast:[
        {
            name:"Phở bò",
            image:"https://images.unsplash.com/photo-1582878826629-29b7ad1cdc43?auto=format&fit=crop&w=800&q=80"
        },
        {
            name:"Bánh mì trứng",
            image:"images/bmt.jpg"
        }
    ],
    lunch:[
        {
            name:"Cơm tấm",
            image:"images/comtam.jpg"
        },
        {
            name:"Bún chả",
            image:"images/buncha.jpg"
        }
    ],
    dinner:[
        {
            name:"Lẩu hải sản",
            image:"images/lhs.jpg"
        },
        {
            name:"Pizza",
            image:"images/pizza.jpg"
        }
    ]
};

// Lấy từ localStorage nếu có
let foods = JSON.parse(localStorage.getItem("foods")) || defaultFoods;

function saveData(){
    localStorage.setItem("foods", JSON.stringify(foods));
}

function randomFood(type){
    if(foods[type].length === 0){
        alert("Chưa có món nào!");
        return;
    }

    const randomIndex = Math.floor(Math.random()*foods[type].length);
    const selected = foods[type][randomIndex];

    document.getElementById(type+"Result").innerText = selected.name;
    document.getElementById(type+"Img").src = selected.image;
}

function addFood(type){
    const nameInput = document.getElementById(type+"Name");
    const imageInput = document.getElementById(type+"Image");

    const name = nameInput.value.trim();
    const image = imageInput.value.trim();

    if(name === "" || image === ""){
        alert("Vui lòng nhập đủ thông tin!");
        return;
    }

    foods[type].push({name, image});
    saveData();

    nameInput.value="";
    imageInput.value="";

    alert("Đã thêm món thành công!");
}

</script>

</body>
</html>
